            - paragraph [ref=f1e608]: "Abrir negando a intuição comum: mais serviços não quebram o monólito se o acoplamento apenas muda do código para a rede."
            - paragraph [ref=f1e609]: Criar mais serviços não quebra um monólito.\n\nÀs vezes, só espalha o acoplamento pela rede.\n\nO diagrama fica mais moderno.\nO deploy fica mais sensível.\nA rastreabilidade fica pior.\nE uma falha que antes era local começa a atravessar o produto inteiro.\n\nO problema não é ter um monólito.\n\nO problema é chamar de microsserviços um sistema que ainda precisa mudar, quebrar e subir junto.\n\nAntes de perguntar qual serviço criar, a pergunta honesta é:\n\nqual parte do produto já consegue evoluir sem arrastar o resto?
            - button "Selecionar" [ref=f1e611]
